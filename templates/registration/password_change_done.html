{% extends 'base.html' %}
{% block title %}Senha Alterada{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-start py-4">
    <div style="width:100%;max-width:480px;">
        <div class="card border-0 shadow-sm text-center">
            <div class="card-body p-4">
                <div style="font-size:3rem;margin-bottom:1rem;">🔐</div>
                <h5 class="fw-bold mb-2">Senha alterada com sucesso!</h5>
                <p class="text-muted mb-4">Sua senha foi atualizada. Use a nova senha no próximo login.</p>
                <a href="{% url 'home' %}" class="btn btn-primary">
                    <i class='bx bx-home me-1'></i> Ir para o início
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
